services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: incidents_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
      
  api:
    build: ./backend
    ports: ["3000:3000"]
    env_file: .env.development
    depends_on:
      postgres: { condition: service_healthy }
      mongo: { condition: service_started }
      redis: { condition: service_started }

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    depends_on: [api]

  php-legacy:
    image: php:8.2-cli
    volumes:
      - ./legacy:/app
    working_dir: /app
    environment:
      API_BASE_URL: http://api:3000
      LEGACY_API_KEY: dev-key
    command: php legacy-client.php
    depends_on: [api]

volumes:
  postgres_data:
  mongo_data: